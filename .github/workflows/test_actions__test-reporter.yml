name: Test actions/test-reporter

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

# SRC: https://github.com/dorny/test-reporter?tab=readme-ov-file#recommended-setup-for-public-repositories
permissions:
  contents: read
  actions: read
  checks: write

env: # required
  REPORTER: jest-junit
  FILES_PATTERN: assets/test-results/jest/junit.xml

jobs:
  default:
    name: default
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/test-reporter
        with:
          reporter: ${{ env.REPORTER }}
          files_pattern: ${{ env.FILES_PATTERN }}

  os__matrix:
    needs: default
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        # Different OS
        OS:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.OS }}
    name: "@ ${{ matrix.OS }}"
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/test-reporter
        with:
          name: actions/test-reporter:${{ env.REPORTER }} @ ${{ matrix.OS }}
          reporter: ${{ env.REPORTER }}
          files_pattern: ${{ env.FILES_PATTERN }}

  files_pattern__matrix:
    needs: default
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include:
          - files_pattern: assets/test-results/jest/junit.xml
            reporter: jest-junit

          - files_pattern: assets/test-results/pytest/test-results.xml
            reporter: pytest

    name: "files_pattern: ${{ matrix.files_pattern }}"
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/test-reporter
        with:
          files_pattern: ${{ matrix.files_pattern }}
          reporter: ${{ matrix.reporter }}

  list__matrix:
    needs: default
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        list-suites:
          - all
          - failed

        list-tests:
          - all
          - failed
          - none
    name: list-suites & tests
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/test-reporter
        with:
          name: "actions/test-reporter:${{ env.REPORTER }} list-suites:${{ matrix.list-suites }} list-tests:${{ matrix.list-tests }}"
          reporter: ${{ env.REPORTER }}
          files_pattern: ${{ env.FILES_PATTERN }}
          list-suites: ${{ matrix.list-suites }}
          list-tests: ${{ matrix.list-tests }}
